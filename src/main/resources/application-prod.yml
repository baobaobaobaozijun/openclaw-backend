server:
  port: 8081
  servlet:
    context-path: /api

spring:
  datasource:
    url: jdbc:mysql://8.137.175.240:3306/baozipu
    username: root
    password: ${DB_PASSWORD:}  # 从环境变量获取，如果没有则为空
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  redis:
    host: 8.137.175.240
    port: 6379
    database: 0
    timeout: 2000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

jwt:
  secret: ${JWT_SECRET:mySecretKey}
  expiration: 86400000

logging:
  level:
    com.openclaw.blog: info  # 生产环境降低日志级别
    org.springframework.web: info

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html